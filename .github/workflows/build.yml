name: Build

# Verify the CMake project compiles cleanly on every push and pull request.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  cmake-build:
    name: CMake build (Fedora)
    # Fedora ships KDE Plasma 6 as its default desktop, so all required KDE 6
    # and dbusmenu-qt6 development packages are available in the main repo.
    runs-on: ubuntu-latest
    container:
      image: fedora:42

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf install -y \
            cmake \
            extra-cmake-modules \
            ninja-build \
            qt6-qtbase-devel \
            qt6-qtdeclarative-devel \
            kf6-kwindowsystem-devel

      - name: Find dbusmenu Qt6 package name
        run: dnf search dbusmenu 2>/dev/null | grep -i qt || echo "(no qt match)"

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build
