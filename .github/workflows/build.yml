name: Build

# Verify the CMake project compiles cleanly on every push and pull request.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  cmake-build:
    name: CMake build (Ubuntu 26.04)
    runs-on: ubuntu-latest
    container:
      image: ubuntu:26.04

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          apt-get update
          apt-get install -y \
            build-essential \
            cmake \
            extra-cmake-modules \
            ninja-build \
            qt6-base-dev \
            qt6-declarative-dev \
            libkf6windowsystem-dev

      - name: Configure
        run: >
          cmake -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX=/usr

      - name: Build
        run: cmake --build build
